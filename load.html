<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0;
}

.scanline-overlay {
  background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
              linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
  background-size: 100% 4px, 3px 100%;
}

.kinetic-ember-glow {
  text-shadow: 0 0 12px rgba(255,185,124,0.6);
}

.bar-glow {

@keyframes progress-scan {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }

<div class="absolute inset-0 scanline-overlay opacity-20"></div>
</div>

<!-- MAIN -->
<main class="relative z-10 h-full flex flex-col items-center justify-center">

<!-- TEXT -->
<div class="mb-6 text-orange-400 text-xs tracking-widest uppercase">
ESTABLISHING NEURAL LINK...
</div>

<!-- % -->
<div class="text-7xl font-bold text-orange-400 kinetic-ember-glow mb-10">
<span id="loading-counter">0</span>%
</div>

<!-- BAR -->

<div class="absolute top-0 h-full w-12 bg-white/20 blur-md animate-scan"></div>
</div>

<!-- ✅ START BUTTON -->
<a href="home.html" id="start-btn"
class="mt-10 hidden px-6 py-3 border border-orange-400 text-orange-400 tracking-widest uppercase hover:bg-orange-400 hover:text-black transition-all">
ENTER SYSTEM
</a>

</main>

<script>
function animateLoading() {
  const counter = document.getElementById('loading-counter');
  const bar = document.getElementById('loading-bar');
  const btn = document.getElementById('start-btn');

  let progress = 0;

  function update() {
    if (progress < 100) {
      let inc = Math.random() < 0.3 ? Math.random()*0.5 : Math.random()*1.5;
      progress = Math.min(100, progress + inc);

      counter.textContent = Math.floor(progress);
      bar.style.width = progress + "%";

      setTimeout(update, Math.random()*100 + 20);
    } else {
      counter.textContent = "100";
      bar.style.width = "100%";

      // ✅ SHOW BUTTON
      btn.classList.remove("hidden");
    }
  }

  update();
}

window.onload = animateLoading;
</script>

</body>
</html>
